<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>UltraPro</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Helvetica:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
<div class="logo">UltraPro</div>
</div>

<!-- AUTH SECTION -->
<section id="authSection">

<div class="auth-container">

<div class="left">
<h1>UltraPro</h1>
<p>Connect professionally and access your dashboard.</p>
</div>

<div class="right">

<div class="card">

<div id="messageBox" class="message hidden"></div>

<input type="email" id="email" placeholder="Email address">
<input type="password" id="password" placeholder="Password">

<button id="loginBtn" class="btn-primary">Log In</button>

<p class="forgot" id="forgotBtn">Forgotten password?</p>

<hr>

<button id="signupBtn" class="btn-green">Create New Account</button>

</div>

</div>

</div>

</section>

<!-- DASHBOARD -->
<section id="app" class="hidden">

<div class="navbar">
<div class="logo">UltraPro</div>
<button id="logoutBtn" class="logout">Logout</button>
</div>

<div class="dashboard">
<h2>Welcome Back</h2>
<p>Your account is active.</p>
</div>

</section>

<script type="module" src="js/firebase.js"></script>
<script type="module" src="js/app.js"></script>

</body>
</html>
